{{- with site.Params.homeInfoParams }}
<article class="first-entry home-info">
  <div style="display:flex;align-items:center;gap:28px;flex-wrap:wrap">

    <!-- wavefunction + cat -->
    <div style="display:flex;align-items:center;flex-shrink:0">
      <div style="
        width:100px;height:68px;
        background:repeating-linear-gradient(
          to bottom,
          #ff2222 0,#ff2222 9px,
          #ff8800 11px,#ff8800 20px,
          #ffdd00 22px,#ffdd00 31px,
          #22bb22 33px,#22bb22 42px,
          #2288ff 44px,#2288ff 53px,
          #aa22ff 55px,#aa22ff 64px);
        margin-right:-3px">
      </div>
      <img src="/img/cat.png"
           style="width:120px;image-rendering:pixelated;
                  animation:bob 0.5s ease-in-out infinite"
           alt="meowsicist">
    </div>

    <!-- text -->
    <div style="flex:1;min-width:220px">
      <h1 style="font-size:20px;margin-bottom:10px;color:#c9a0ff;font-family:monospace">
        {{ .Title | markdownify }}
      </h1>
      <p style="font-size:13px;color:#6a6a8a;line-height:1.7;font-family:monospace">
        {{ .Content | markdownify }}
      </p>
    </div>
  </div>
</article>

<style>
@keyframes bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}
</style>
{{- end }}
